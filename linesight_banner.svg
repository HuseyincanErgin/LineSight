<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', 'Consolas', 'Courier New', monospace">
  <defs>
    <!-- background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#070d18"/>
    </linearGradient>

    <!-- title gradient -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- moving shine over the title -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="titleClip">
      <text x="600" y="128" text-anchor="middle" font-size="78" font-weight="700"
            letter-spacing="2">LineSight</text>
    </clipPath>

    <style>
      .belt   { animation: beltmove 1.2s linear infinite; }
      .roller { transform-box: fill-box; transform-origin: center; animation: spin 1.6s linear infinite; }
      .part   { animation: ride 9s linear infinite; }
      .p2 { animation-delay: -2.25s; }
      .p3 { animation-delay: -4.5s; }
      .p4 { animation-delay: -6.75s; }
      .scan  { animation: sweep 5s ease-in-out infinite; }
      .shineRect { animation: shineMove 4s ease-in-out infinite; }
      .dot { animation: blink 1.4s ease-in-out infinite; }

      @keyframes beltmove { to { stroke-dashoffset: -40; } }
      @keyframes spin     { to { transform: rotate(360deg); } }
      @keyframes ride     { 0% { transform: translateX(-120px); } 100% { transform: translateX(1320px); } }
      @keyframes sweep    { 0%,100% { transform: translateX(-40px); } 50% { transform: translateX(1240px); } }
      @keyframes shineMove{ 0% { transform: translateX(-700px); } 60%,100% { transform: translateX(700px); } }
      @keyframes blink    { 0%,100% { opacity: 0.25; } 50% { opacity: 1; } }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- top tag -->
  <text x="600" y="48" text-anchor="middle" fill="#475569" font-size="14" letter-spacing="6">
    PRODUCTION QUALITY • MACHINE RISK • AI MAINTENANCE INSIGHT
  </text>

  <!-- title -->
  <text x="600" y="128" text-anchor="middle" font-size="78" font-weight="700"
        letter-spacing="2" fill="url(#titleGrad)" filter="url(#glow)">LineSight</text>

  <!-- moving shine clipped to title -->
  <g clip-path="url(#titleClip)">
    <rect class="shineRect" x="0" y="60" width="220" height="90" fill="url(#shine)"/>
  </g>

  <!-- tagline -->
  <text x="600" y="170" text-anchor="middle" fill="#94a3b8" font-size="17" letter-spacing="3">
    See the line. Understand the risk. Improve the process.
  </text>

  <!-- ===================== CONVEYOR LINE ===================== -->
  <g transform="translate(0,212)">
    <!-- belt body -->
    <rect x="40" y="40" width="1120" height="26" rx="6" fill="#111c2e" stroke="#1f3147" stroke-width="1.5"/>
    <!-- moving belt texture -->
    <line class="belt" x1="46" y1="53" x2="1154" y2="53"
          stroke="#334155" stroke-width="3" stroke-dasharray="14 26" stroke-linecap="round"/>

    <!-- rollers -->
    <g fill="#0e1726" stroke="#38bdf8" stroke-width="2">
      <circle class="roller" cx="70"   cy="78" r="12"/>
      <circle class="roller" cx="600"  cy="78" r="12"/>
      <circle class="roller" cx="1130" cy="78" r="12"/>
      <circle class="roller" cx="335"  cy="78" r="9"/>
      <circle class="roller" cx="865"  cy="78" r="9"/>
    </g>
    <g stroke="#1f3147" stroke-width="1.5"><line x1="70" y1="78" x2="70" y2="78"/></g>

    <!-- parts riding the belt -->
    <g>
      <g class="part">      <rect x="0" y="14" width="40" height="26" rx="4" fill="#0f766e" stroke="#2dd4bf" stroke-width="1.5"/><circle cx="20" cy="10" r="3" fill="#2dd4bf"/></g>
      <g class="part p2">   <rect x="0" y="14" width="40" height="26" rx="4" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/><circle cx="20" cy="10" r="3" fill="#38bdf8"/></g>
      <g class="part p3">   <rect x="0" y="14" width="40" height="26" rx="4" fill="#3b1d2b" stroke="#fb7185" stroke-width="1.5"/><circle cx="20" cy="10" r="3" fill="#fb7185"/></g>
      <g class="part p4">   <rect x="0" y="14" width="40" height="26" rx="4" fill="#2a2350" stroke="#a78bfa" stroke-width="1.5"/><circle cx="20" cy="10" r="3" fill="#a78bfa"/></g>
    </g>

    <!-- inspection scan beam sweeping across -->
    <g class="scan">
      <rect x="-2" y="-6" width="4" height="92" fill="url(#beam)"/>
      <circle class="dot" cx="0" cy="-10" r="4" fill="#38bdf8"/>
    </g>
  </g>

  <!-- corner ticks -->
  <g stroke="#38bdf8" stroke-width="2" opacity="0.6" fill="none">
    <path d="M18 18 h22 M18 18 v22"/>
    <path d="M1182 18 h-22 M1182 18 v22"/>
    <path d="M18 302 h22 M18 302 v-22"/>
    <path d="M1182 302 h-22 M1182 302 v-22"/>
  </g>
</svg>
